<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020817" />
  <title>Trip Mileage Logger</title>
  <link rel="icon" type="image/png" href="mile%20icon.png" />
  <link rel="apple-touch-icon" href="mile%20icon.png" />

  <style>
    :root {
      --bg: #020817;
      --card: #0f1a2b;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --border: #243247;
      --primary: #2563eb;
      --accent: #7c3aed;
      --success: #22c55e;
      --danger: #f87171;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      border: 1px solid var(--border);
    }

    h1 { margin-top: 0; }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #07111f;
      color: white;
    }

    button {
      margin-top: 16px;
      padding: 14px;
      width: 100%;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      font-weight: bold;
      font-size: 16px;
    }

    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      display: none;
    }

    .success { background: #063; display: block; }
    .error { background: #600; display: block; }
  </style>
</head>

<body>
<div class="app">

<h1>Mileage Logger</h1>

<form id="tripForm">

<label>Sales Rep</label>
<input id="repName" required>

<label>Trip Date</label>
<input id="tripDate" type="date" required>

<label>Submission Type</label>
<select id="submissionType">
  <option>Start of trip</option>
  <option>End of trip</option>
</select>

<label>Odometer</label>
<input id="odometer" type="number" required>

<label>City/Market of Destination</label>
<input id="destination" required>

<label>Customer</label>
<textarea id="notes" required></textarea>

<button type="submit">Submit</button>

</form>

<div id="status" class="status"></div>

</div>

<script>
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzS9j8_KJffe0iMDaTHKv6W6tXNP7NeFCLhnQc3m1EFPXdJvEMO5aVApP_lqtvutkaccw/exec";

const form = document.getElementById("tripForm");
const statusBox = document.getElementById("status");
const repNameInput = document.getElementById("repName");
const dateInput = document.getElementById("tripDate");

const savedName = localStorage.getItem("repName");
if (savedName) repNameInput.value = savedName;

dateInput.valueAsDate = new Date();

function show(msg, type) {
  statusBox.textContent = msg;
  statusBox.className = "status " + type;
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const repName = repNameInput.value.trim();
  const destination = document.getElementById("destination").value.trim();
  const customer = document.getElementById("notes").value.trim();

  if (!destination || !customer) {
    show("City/Market and Customer are required", "error");
    return;
  }

  localStorage.setItem("repName", repName);

  const data = {
    submittedAt: new Date().toISOString(),
    repName,
    tripDate: dateInput.value,
    submissionType: document.getElementById("submissionType").value,
    odometer: document.getElementById("odometer").value,
    destination,
    notes: customer
  };

  show("Submitting...", "success");

  try {
    await fetch(WEB_APP_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(data)
    });

    show("Submitted!", "success");
    form.reset();
    repNameInput.value = localStorage.getItem("repName");
    dateInput.valueAsDate = new Date();

  } catch {
    show("Submission failed", "error");
  }
});
</script>

</body>
</html>
