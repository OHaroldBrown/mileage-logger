<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020817" />
  <title>Trip Mileage Logger</title>
  <link rel="icon" type="image/png" href="mile%20icon.png" />
  <link rel="apple-touch-icon" href="mile%20icon.png" />
  <link rel="shortcut icon" href="mile%20icon.png" />
  <style>
    :root {
      --bg: #020817;
      --bg-2: #07111f;
      --card: #0f1a2b;
      --card-2: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --border: #243247;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --accent: #7c3aed;
      --success: #22c55e;
      --danger: #f87171;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top, #0f1a2b 0%, var(--bg) 45%, #000814 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 430px;
      background: linear-gradient(180deg, var(--card), var(--card-2));
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .header {
      background: linear-gradient(135deg, #07111f, #111827 55%, #1e1b4b);
      color: var(--text);
      padding: 28px 24px 24px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.1;
    }

    .header p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    form {
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    label {
      display: block;
      color: #cbd5e1;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input, textarea, select, button {
      width: 100%;
      font: inherit;
      border-radius: 16px;
    }

    input, textarea, select {
      border: 1px solid var(--border);
      padding: 15px 14px;
      font-size: 17px;
      background: #07111f;
      color: var(--text);
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.18);
    }

    textarea {
      resize: vertical;
      min-height: 82px;
    }

    button {
      appearance: none;
      border: 0;
      padding: 16px 18px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white;
      font-weight: 800;
      font-size: 18px;
      cursor: pointer;
      margin-top: 4px;
    }

    button:hover { background: linear-gradient(135deg, var(--primary-hover), #6d28d9); }
    button:disabled { opacity: 0.65; cursor: not-allowed; }

    .status {
      display: none;
      margin: 0 24px 24px;
      padding: 14px 16px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 14px;
    }

    .status.success {
      display: block;
      background: rgba(34, 197, 94, 0.12);
      color: var(--success);
      border: 1px solid rgba(34, 197, 94, 0.35);
    }

    .status.error {
      display: block;
      background: rgba(248, 113, 113, 0.12);
      color: var(--danger);
      border: 1px solid rgba(248, 113, 113, 0.35);
    }

    input::placeholder, textarea::placeholder {
      color: #64748b;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      margin-top: -8px;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1>Trip Mileage Logger</h1>
      <p>Submit start or end odometer readings to the mileage spreadsheet.</p>
    </section>

    <form id="tripForm">
      <div>
        <label for="repName">Sales rep</label>
        <input id="repName" name="repName" type="text" placeholder="Your name" required />
      </div>

      <div>
        <label for="tripDate">Trip date</label>
        <input id="tripDate" name="tripDate" type="date" required />
      </div>

      <div>
        <label for="submissionType">Submission type</label>
        <select id="submissionType" name="submissionType" required>
          <option value="Start of trip">Start of trip odometer</option>
          <option value="End of trip">End of trip odometer</option>
        </select>
      </div>

      <div>
        <label for="odometer">Odometer reading</label>
        <input id="odometer" name="odometer" type="number" inputmode="numeric" min="0" step="1" placeholder="Enter odometer miles" required />
      </div>

      <div>
        <label for="destination">City/Market of Destination</label>
        <input id="destination" name="destination" type="text" placeholder="Enter city or market" required />
      </div>

      <div>
        <label for="notes">Customer</label>
        <textarea id="notes" name="notes" placeholder="Enter customer name" required></textarea>
      </div>

      <p class="hint">Submissions will automatically save to the Google Sheet once you paste your Google Apps Script Web App URL into the code.</p>

      <button id="submitButton" type="submit">Submit trip</button>
    </form>

    <div id="status" class="status"></div>
  </main>

  <script>
    // Paste your Google Apps Script Web App URL between the quotes below.
    const WEB_APP_URL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";

    const form = document.getElementById("tripForm");
    const statusBox = document.getElementById("status");
    const submitButton = document.getElementById("submitButton");
    const dateInput = document.getElementById("tripDate");
    const repNameInput = document.getElementById("repName");

    const savedRepName = localStorage.getItem("mileageLoggerRepName");
    if (savedRepName) {
      repNameInput.value = savedRepName;
    }

    dateInput.valueAsDate = new Date();

    function showStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      // HARD VALIDATION (forces required even if browser cache issues)
      const destinationVal = document.getElementById("destination").value.trim();
      const customerVal = document.getElementById("notes").value.trim();

      if (!destinationVal || !customerVal) {
        showStatus("City/Market and Customer are required.", "error");
        return;
      }


      event.preventDefault();

      if (!WEB_APP_URL || WEB_APP_URL === "PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") {
        showStatus("Setup needed: paste your Google Apps Script Web App URL into the code first.", "error");
        return;
      }

      submitButton.disabled = true;
      showStatus("Submitting...", "success");

      const formData = new FormData(form);
      const repName = formData.get("repName").trim();
      localStorage.setItem("mileageLoggerRepName", repName);

      const entry = {
        submittedAt: new Date().toISOString(),
        repName: repName,
        tripDate: formData.get("tripDate"),
        submissionType: formData.get("submissionType"),
        odometer: Number(formData.get("odometer")),
        destination: formData.get("destination").trim(),
        notes: formData.get("notes").trim()
      };

      try {
        await fetch(WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(entry)
        });

        showStatus("Submitted successfully.", "success");
        form.reset();
        repNameInput.value = localStorage.getItem("mileageLoggerRepName") || "";
        dateInput.valueAsDate = new Date();
      } catch (error) {
        console.error(error);
        showStatus("Submission failed. Check the Web App URL and try again.", "error");
      } finally {
        submitButton.disabled = false;
      }
    });
  </script>
</body>
</html>
