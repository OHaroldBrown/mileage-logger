<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <title>Trip Mileage Logger</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d1d5db;
      --primary: #111827;
      --primary-hover: #374151;
      --success: #047857;
      --danger: #b91c1c;
      --shadow: 0 12px 30px rgba(17, 24, 39, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, #f9fafb, var(--bg));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 430px;
      background: var(--card);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(209, 213, 219, 0.7);
    }

    .header {
      background: var(--primary);
      color: white;
      padding: 28px 24px 24px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.1;
    }

    .header p {
      margin: 0;
      color: #d1d5db;
      font-size: 15px;
    }

    form {
      padding: 24px;
      display: grid;
      gap: 18px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input, textarea, select, button {
      width: 100%;
      font: inherit;
      border-radius: 16px;
    }

    input, textarea, select {
      border: 1px solid var(--border);
      padding: 15px 14px;
      font-size: 17px;
      background: white;
      color: var(--text);
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.08);
    }

    textarea {
      resize: vertical;
      min-height: 82px;
    }

    button {
      appearance: none;
      border: 0;
      padding: 16px 18px;
      background: var(--primary);
      color: white;
      font-weight: 800;
      font-size: 18px;
      cursor: pointer;
      margin-top: 4px;
    }

    button:hover { background: var(--primary-hover); }
    button:disabled { opacity: 0.65; cursor: not-allowed; }

    .status {
      display: none;
      margin: 0 24px 24px;
      padding: 14px 16px;
      border-radius: 16px;
      font-weight: 700;
      font-size: 14px;
    }

    .status.success {
      display: block;
      background: #ecfdf5;
      color: var(--success);
      border: 1px solid #a7f3d0;
    }

    .status.error {
      display: block;
      background: #fef2f2;
      color: var(--danger);
      border: 1px solid #fecaca;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
      margin-top: -8px;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1>Trip Mileage Logger</h1>
      <p>Submit start or end odometer readings by email.</p>
    </section>

    <form id="tripForm">
      <div>
        <label for="repName">Sales rep</label>
        <input id="repName" name="repName" type="text" placeholder="Your name" required />
      </div>

      <div>
        <label for="tripDate">Trip date</label>
        <input id="tripDate" name="tripDate" type="date" required />
      </div>

      <div>
        <label for="submissionType">Submission type</label>
        <select id="submissionType" name="submissionType" required>
          <option value="Start of trip">Start of trip odometer</option>
          <option value="End of trip">End of trip odometer</option>
        </select>
      </div>

      <div>
        <label for="odometer">Odometer reading</label>
        <input id="odometer" name="odometer" type="number" inputmode="numeric" min="0" step="1" placeholder="Enter odometer miles" required />
      </div>

      <div>
        <label for="destination">Destination / customer</label>
        <input id="destination" name="destination" type="text" placeholder="Optional" />
      </div>

      <div>
        <label for="notes">Notes</label>
        <textarea id="notes" name="notes" placeholder="Optional notes"></textarea>
      </div>

      <p class="hint">This will open the user’s email app with the trip details filled in. Some previews block email links, but it should work when hosted normally.</p>

      <button id="submitButton" type="submit">Submit trip</button>
    </form>

    <div id="status" class="status"></div>
    <div id="emailFallback" style="display:none; margin: 0 24px 24px;">
      <a id="emailLink" href="#" style="display:block; text-align:center; background:#111827; color:white; text-decoration:none; padding:14px 16px; border-radius:16px; font-weight:800;">Tap here to open email</a>
    </div>
  </main>

  <script>
    const EMAIL_TO = "harold@antebellummfg.com";

    const form = document.getElementById("tripForm");
    const statusBox = document.getElementById("status");
    const fallbackBox = document.getElementById("emailFallback");
    const emailLink = document.getElementById("emailLink");
    const submitButton = document.getElementById("submitButton");
    const dateInput = document.getElementById("tripDate");

    dateInput.valueAsDate = new Date();

    function showStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      submitButton.disabled = true;

      const formData = new FormData(form);

      const entry = {
        repName: formData.get("repName").trim(),
        tripDate: formData.get("tripDate"),
        submissionType: formData.get("submissionType"),
        odometer: Number(formData.get("odometer")),
        destination: formData.get("destination").trim(),
        notes: formData.get("notes").trim()
      };

      const subject = `Odometer Log - ${entry.repName} - ${entry.submissionType} - ${entry.tripDate}`;

      const body = `Sales Rep: ${entry.repName}%0D%0A
Date: ${entry.tripDate}%0D%0A
Submission Type: ${entry.submissionType}%0D%0A
Odometer Reading: ${entry.odometer} miles%0D%0A
Destination: ${entry.destination || "-"}%0D%0A
Notes: ${entry.notes || "-"}`;

      const mailtoLink = `mailto:${EMAIL_TO}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body.replace(/%0D%0A/g, "
"))}`;

      emailLink.href = mailtoLink;
      fallbackBox.style.display = "block";

      const emailWindow = window.open(mailtoLink, "_blank");

      if (emailWindow) {
        showStatus("Opening email app...", "success");
      } else {
        showStatus("Email pop-up was blocked. Tap the button below to open email.", "error");
      }

      submitButton.disabled = false;
    });
  </script>
</body>
</html>
